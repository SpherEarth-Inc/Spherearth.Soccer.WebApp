name: Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dreamhost
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Clean install so every build reflects current code (no stale cache)
      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://academy.spherearth.ca' }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ vars.NEXT_PUBLIC_CALENDLY_URL || '' }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}

      # DreamHost FTP sync (same approach as Rockae / Hostinger):
      # - uploads new/changed files from out/
      # - removes remote files that no longer exist in the build
      # GitHub secrets — Settings → Secrets and variables → Actions:
      #   DREAMHOST_SFTP_SERVER       → hostname only (no ftp:// prefix)
      #   DREAMHOST_SFTP_USERNAME     → DreamHost FTP/SFTP user
      #   DREAMHOST_SFTP_PASSWORD     → DreamHost FTP/SFTP password
      #   DREAMHOST_SFTP_REMOTE_PATH  → site root with trailing slash, e.g. academy.spherearth.ca/
      - name: Deploy to DreamHost via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.DREAMHOST_SFTP_SERVER }}
          username: ${{ secrets.DREAMHOST_SFTP_USERNAME }}
          password: ${{ secrets.DREAMHOST_SFTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./out/
          server-dir: ${{ secrets.DREAMHOST_SFTP_REMOTE_PATH }}
          log-level: verbose
