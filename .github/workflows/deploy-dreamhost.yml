name: Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dreamhost
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://academy.spherearth.ca' }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ vars.NEXT_PUBLIC_CALENDLY_URL || '' }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}

      - name: Deploy to DreamHost via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.DREAMHOST_SFTP_SERVER }}
          username: ${{ secrets.DREAMHOST_SFTP_USERNAME }}
          password: ${{ secrets.DREAMHOST_SFTP_PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: ./out/
          server-dir: ${{ secrets.DREAMHOST_SFTP_REMOTE_PATH }}
          # Set to true only if you want every deploy to delete remote files
          # that no longer exist in the build output.
          dangerous-clean-slate: false
