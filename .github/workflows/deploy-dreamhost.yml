name: Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dreamhost
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Clean install so every build reflects current code (no stale cache)
      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://academy.spherearth.ca' }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ vars.NEXT_PUBLIC_CALENDLY_URL || '' }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}

      # DreamHost uses SFTP (port 22), not plain FTP (port 21).
      # Rockae uses FTP on Hostinger; those credentials/protocol do not transfer here.
      # lftp mirror --delete syncs out/ like FTP-Deploy-Action: upload changes + remove stale files.
      # GitHub secrets — Settings → Secrets and variables → Actions:
      #   DREAMHOST_SFTP_SERVER       → hostname only (no sftp:// prefix)
      #   DREAMHOST_SFTP_USERNAME     → DreamHost SFTP user
      #   DREAMHOST_SFTP_PASSWORD     → DreamHost SFTP password
      #   DREAMHOST_SFTP_REMOTE_PATH  → web root where index.html lives (not a parent folder)
      #                                 e.g. /home/user/academy.spherearth.ca/
      #                                 Wrong: /home/user/  (creates academy.spherearth.ca/out/ on server)
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Sync site to DreamHost via SFTP
        env:
          SFTP_SERVER: ${{ secrets.DREAMHOST_SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.DREAMHOST_SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.DREAMHOST_SFTP_PASSWORD }}
          SFTP_REMOTE_PATH: ${{ secrets.DREAMHOST_SFTP_REMOTE_PATH }}
        run: |
          REMOTE="${SFTP_REMOTE_PATH:-/}"
          case "$REMOTE" in
            */) ;;
            *) REMOTE="${REMOTE}/" ;;
          esac
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" "sftp://$SFTP_SERVER" <<EOF
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          mirror -R --delete --parallel=4 --verbose ./out/ $REMOTE
          quit
          EOF
